spring:
  application:
    name: {{projectName}}-server
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/{{projectName}}}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:3001}
